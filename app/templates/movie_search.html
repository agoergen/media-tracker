{% extends "base.html" %}

{% block content %}
    <h1>Search Movies</h1>
    
    <form method="POST">
        <input type="text" name="query" placeholder="Enter movie title..." value="{{ query }}" required style="padding: 10px; width: 300px; border-radius: 4px; border: 1px solid #ccc;">
        <button type="submit" class="btn">Search</button>
    </form>

    <div class="search-results">
        {% if results %}
            {% for movie in results %}
            <div class="result-card">
                <div>
                    <strong>{{ movie.Title }}</strong> ({{ movie.Year }})
                </div>
                <form action="{{ url_for('main.add_movie', imdb_id=movie.imdbID) }}" method="POST">
                    <button type="submit" class="btn btn-secondary">Track Movie</button>
                </form>
            </div>
            {% endfor %}
        {% elif query %}
            <p>No movies found for "{{ query }}".</p>
        {% endif %}
    </div>
{% endblock %}
