{% extends "base.html" %}

{% block content %}
    <div style="max-width: 400px; margin: 5rem auto; background: var(--white); padding: 2rem; border-radius: 8px; box-shadow: 0 4px 10px rgba(0,0,0,0.1);">
        <h1 style="margin-top: 0;">Login</h1>
        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box;">
            </div>
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required style="padding: 10px; border-radius: 4px; border: 1px solid #ccc; width: 100%; box-sizing: border-box;">
            </div>
            <button type="submit" class="btn btn-success" style="width: 100%; margin-top: 10px;">Login</button>
        </form>
    </div>
{% endblock %}
